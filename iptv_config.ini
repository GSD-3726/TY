[基础配置]
TARGET_URL = https://iptv.809899.xyz           # 目标网站地址
HEADLESS = True                               # 是否隐藏浏览器窗口 (True=后台运行, False=显示窗口)
BROWSER_TYPE = chromium                       # 浏览器内核类型 (chromium/firefox/webkit)
MAX_IPS = 15                                   # 最多处理前N个IP/地址 (0表示不限制)
PAGE_LOAD_TIMEOUT = 120000                    # 页面加载最长等待时间 (毫秒)
DELAY_BETWEEN_IPS = 1.0                       # 处理完一个IP后等待多久 (秒)
DELAY_AFTER_CLICK = 0.5                       # 点击按钮后等待弹窗多久 (秒)
MAX_CHANNELS_PER_IP = 0                       # 单个IP最多提取多少个频道 (0表示不限制)
DEFAULT_PROTOCOL = http://                     # 当链接缺少协议头时，自动补全的默认协议

[页面配置]
ENGINE_SEARCH = 引索搜索,引擎搜索,关键词搜索   # 引擎搜索按钮的文本关键词（多个用逗号分隔）
MULTICAST_TAB = 酒店提取                      # 组播标签的文本关键词（多个用逗号分隔，如"酒店提取"）
START_BUTTON = 开始播放,开始搜索,开始提取     # 开始按钮的文本关键词（多个用逗号分隔）

[输出配置]
OUTPUT_DIR =                                  # 结果保存目录 (默认为脚本所在文件夹，可填绝对路径如D:/iptv)
OUTPUT_M3U_FILENAME = iptv_channels.m3u       # M3U播放列表文件名
OUTPUT_TXT_FILENAME = iptv_channels.txt       # TXT格式文件名
MAX_LINKS_PER_CHANNEL = 10                    # 单个频道最多保留的源数量
TIME_DISPLAY_AT_TOP = False                   # 更新时间显示位置 (True=文件最上面, False=文件最后面)
UPDATE_STREAM_URL = https://gitee.com/bmg369/tvtest/raw/master/cg/index.m3u8  # 更新时间条目占位流地址

[自定义源配置]
ENABLE_CUSTOM_SOURCES = True                  # 是否启用自定义直播源
# 自定义源列表：
CUSTOM_SOURCES = http://156.238.248.80:8880/live.m3u?key=172125  
