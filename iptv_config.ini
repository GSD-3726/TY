[基础配置]
# 目标网站地址
TARGET_URL = https://iptv.809899.xyz
# 是否隐藏浏览器窗口 (True=后台运行, False=显示窗口)
HEADLESS = True
# 浏览器内核类型 (chromium/firefox/webkit)
BROWSER_TYPE = chromium
# 最多处理前N个IP/地址 (0表示不限制)
MAX_IPS = 20
# 页面加载最长等待时间 (毫秒)
PAGE_LOAD_TIMEOUT = 120000
# 处理完一个IP后等待多久 (秒)
DELAY_BETWEEN_IPS = 1.0
# 点击按钮后等待弹窗多久 (秒)
DELAY_AFTER_CLICK = 0.5
# 单个IP最多提取多少个频道 (0表示不限制)
MAX_CHANNELS_PER_IP = 0
# 当链接缺少协议头时，自动补全的默认协议
DEFAULT_PROTOCOL = http://

[页面配置]
# 引擎搜索按钮的文本关键词（多个用逗号分隔）
ENGINE_SEARCH = 引索搜索,引擎搜索,关键词搜索
# 组播标签的文本关键词（多个用逗号分隔，如"酒店提取"）
MULTICAST_TAB = 酒店提取
# 开始按钮的文本关键词（多个用逗号分隔）
START_BUTTON = 开始播放,开始搜索,开始提取

[输出配置]
# 结果保存目录 (默认为脚本所在文件夹，可填绝对路径如D:/iptv)
OUTPUT_DIR =
# M3U播放列表文件名
OUTPUT_M3U_FILENAME = iptv_channels.m3u
# TXT格式文件名
OUTPUT_TXT_FILENAME = iptv_channels.txt
# 单个频道最多保留的源数量
MAX_LINKS_PER_CHANNEL = 10
# 更新时间显示位置 (True=文件最上面, False=文件最后面)
TIME_DISPLAY_AT_TOP = False
# 更新时间条目占位流地址
UPDATE_STREAM_URL = https://gitee.com/bmg369/tvtest/raw/master/cg/index.m3u8

[自定义源配置]
# 是否启用自定义直播源
ENABLE_CUSTOM_SOURCES = True
# 自定义源列表（多个用换行分隔，每行一个源）
CUSTOM_SOURCES = https://gh-proxy.com/https://github.com/ums91/iptvums/blob/main/playlists/all-channels.m3u
                 https://gh-proxy.com/https://github.com/9527xiao9527/iptv/blob/main/iptv.txt
                 https://gh-proxy.com/https://github.com/biojio481-web/Iptv/blob/main/playlist.m3u
                 https://gh-proxy.com/https://github.com/vbskycn/iptv/blob/master/tv/iptv4.m3u
                

[FFmpeg测速配置]
# 是否开启测速 (False直接保存所有链接)
ENABLE_FFMPEG_TEST = True
# FFmpeg程序路径（如系统已配置环境变量，填ffmpeg即可）
FFMPEG_PATH = ffmpeg
# 同时测试的链接数
FFMPEG_CONCURRENCY = 3
# 短测时长 (秒)
FFMPEG_TEST_DURATION_SHORT = 5
# 短测最低解码帧数
MIN_FRAMES_SHORT = 10
# 长测时长 (秒)
FFMPEG_TEST_DURATION_FULL = 15
# 长测最低解码帧数
MIN_FRAMES_FULL = 280
# 最低平均帧率 (fps)
MIN_AVG_FPS = 24.0

[HLS预检配置]
# 是否开启轻量级预检 (快速淘汰死链)
ENABLE_HLS_PRECHECK = True
# 最低带宽要求 (MB/s)，低于此值直接淘汰
HLS_MIN_BANDWIDTH_MBPS = 0.6

[过滤与分类配置]
# 只对这些分组的频道进行测速（多个用逗号分隔）
TEST_ONLY_GROUPS = 央视频道,卫视频道,电影频道,轮播频道,儿童频道
# 最终只保留这些分组的频道（多个用逗号分隔）
KEEP_GROUPS = 央视频道,卫视频道,电影频道,轮播频道,儿童频道
# 是否优先1920x1080分辨率 (True=1080p排在最前)
PREFER_1080P = True
# 优先分辨率宽度
PREFER_RESOLUTION_WIDTH = 1920
# 优先分辨率高度
PREFER_RESOLUTION_HEIGHT = 1080
# 是否移除频道名中的非中文字符
ENABLE_CHINESE_CLEAN = True
# 是否去重 (相同的频道名+链接只保留一个)
ENABLE_DEDUPLICATION = True
# 是否在关键步骤截图 (用于调试)
ENABLE_SCREENSHOTS = False
# 是否将CCTV数字转为中文 (如 "CCTV-1" 变为 "CCTV-1综合")
CCTV_USE_MAPPING = True

[缓存配置]
# 是否启用缓存 (开启后，测过的链接不再重测)
ENABLE_CACHE = True
# 缓存文件保存位置
CACHE_FILE = iptv_speed_cache.json
# 缓存过期时间 (小时)
CACHE_EXPIRE_HOURS = 48
