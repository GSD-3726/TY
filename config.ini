# ==============================================================================
# IPTV 组播提取工具配置文件
# 适用于 GitHub Actions 自动化运行
# ==============================================================================

[General]
# 要爬取的目标网站地址
TARGET_URL = https://iptv.809899.xyz
# 是否隐藏浏览器窗口 (True=后台运行, False=显示窗口)
HEADLESS = True
# 浏览器内核类型 (chromium/firefox/webkit)
BROWSER_TYPE = chromium
# 最多处理前N个IP/地址行 (0表示不限制)
MAX_IPS = 25
# 最多提取的总频道数 (0表示不限制)
MAX_TOTAL_CHANNELS = 0
# 页面加载最长等待时间(毫秒)
PAGE_LOAD_TIMEOUT = 120000

[Output]
# 结果保存目录 (默认为脚本所在文件夹，留空则使用默认)
OUTPUT_DIR = 
# M3U播放列表文件名
OUTPUT_M3U_FILENAME = iptv_channels.m3u
# TXT格式文件名
OUTPUT_TXT_FILENAME = iptv_channels.txt
# 每个频道最多保留多少个最快的源
MAX_LINKS_PER_CHANNEL = 10

[FFmpeg]
# 总开关：是否开启测速 (False直接保存所有链接)
ENABLE_FFMPEG_TEST = True
# FFmpeg程序位置 (Windows需写完整路径)
FFMPEG_PATH = ffmpeg
# 单个链接的测试时长(秒)
FFMPEG_TEST_DURATION = 10
# 同时测试的链接数 (GitHub Actions建议<=2)
FFMPEG_CONCURRENCY = 10
# 最低平均帧率
MIN_AVG_FPS = 25.0
# 最低解码帧数
MIN_FRAMES = 210
# 帧率稳定性阈值（标准差不超过平均值的百分比）
MIN_STABILITY_PERCENT = 15.0

[GitHub]
# 从GitHub获取的M3U链接，多个链接用逗号分隔
GITHUB_M3U_LINKS = https://gh-proxy.com/https://raw.githubusercontent.com/develop202/migu_video/main/interface.txt, https://gh-proxy.com/https://raw.githubusercontent.com/9527xiao9527/iptv/main/iptv.txt, https://gh.llkk.cc/https://raw.githubusercontent.com/Kimentanm/aptv/master/m3u/iptv.m3u, https://ds65.tv1288.xyz, https://gh-proxy.com/https://raw.githubusercontent.com/vbskycn/iptv/master/tv/iptv4.m3u


[Delay]
# 处理完一个IP后等待多久(秒)
DELAY_BETWEEN_IPS = 1.0
# 点击按钮后等待弹窗多久(秒)
DELAY_AFTER_CLICK = 0.5
# 单个IP最多提取多少个频道 (0表示不限制)
MAX_CHANNELS_PER_IP = 0

[Cleaning]
# 是否移除频道名中的非中文字符 (仅对非央视频道)
ENABLE_CHINESE_CLEAN = True
# 是否去重 (相同的频道名+链接只保留一个)
ENABLE_DEDUPLICATION = True
# 是否在关键步骤截图 (用于调试)
ENABLE_SCREENSHOTS = False
# 是否将CCTV数字转为中文 (如 "CCTV-1" 变为 "CCTV-1综合")
CCTV_USE_MAPPING = True

[Network]
# 当链接缺少协议头时，自动补全 (http:///https:///rtsp://)
DEFAULT_PROTOCOL = http://

[Cache]
# 是否启用缓存 (开启后，测过的链接指定时间内不再重测)
ENABLE_CACHE = True
# 缓存文件保存位置
CACHE_FILE = iptv_speed_cache.json
# 缓存过期时间(小时) (0表示永不过期)
CACHE_EXPIRE_HOURS = 48

[UpdateTime]
# 更新时间显示位置 (True=文件最上面, False=文件最后面)
TIME_DISPLAY_AT_TOP = False
# 更新时间条目占位流
UPDATE_STREAM_URL = https://gitee.com/bmg369/tvtest/raw/master/cg/index.m3u8

[PageElements]
# 页面元素定位关键词 - 引擎搜索
engine_search = 引索搜索, 引擎搜索, 关键词搜索
# 页面元素定位关键词 - 组播提取标签
multicast_tab = 酒店提取
# 页面元素定位关键词 - 开始按钮
start_button = 开始播放, 开始搜索, 开始提取
