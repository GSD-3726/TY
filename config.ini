# ====================== 通用基础配置 ======================
[General]
# 目标IPTV源抓取网站地址
TARGET_URL = https://iptv.809899.xyz
# 是否启用无头浏览器模式（无界面后台静默运行，不弹出浏览器窗口）
HEADLESS = True
# 自动化抓取使用的浏览器内核类型，可选 chromium/firefox/edge 等
BROWSER_TYPE = chromium
# 最大并发使用的IP数量（多IP轮询抓取的上限）
MAX_IPS = 20
# 最大抓取总频道数，0表示不限制，抓取网站内全部可用频道
MAX_TOTAL_CHANNELS = 0
# 页面加载超时时间，单位为毫秒，120000=2分钟
PAGE_LOAD_TIMEOUT = 120000

# ====================== 输出文件配置 ======================
[Output]
# 输出文件的保存目录，空值默认使用当前脚本所在目录
OUTPUT_DIR = 
# 输出M3U格式播放列表的文件名
OUTPUT_M3U_FILENAME = iptv_channels.m3u
# 输出TXT格式频道列表的文件名
OUTPUT_TXT_FILENAME = iptv_channels.txt
# 单个频道最多保留的有效直播链接数量，避免单频道冗余链接过多
MAX_LINKS_PER_CHANNEL = 5

# ====================== FFmpeg直播流测速验活配置 ======================
[FFmpeg]
# 是否启用FFmpeg对直播流的有效性、帧率、稳定性测速校验
ENABLE_FFMPEG_TEST = True
# FFmpeg程序的执行路径，默认调用系统环境变量中配置的ffmpeg
FFMPEG_PATH = ffmpeg
# 单条直播流的测速时长，单位为秒
FFMPEG_TEST_DURATION = 10
# FFmpeg测速的并发数，数值越高测速越快，过高会占用大量系统资源
FFMPEG_CONCURRENCY = 15
# 直播流合格的最低平均帧率，低于此值判定为无效流并剔除
MIN_AVG_FPS = 20.0
# 测速周期内必须成功解码的最低帧数，低于此值判定为无效流
MIN_FRAMES = 240
# 直播流合格的最低稳定性百分比，低于此值判定为卡顿流并剔除
MIN_STABILITY_PERCENT = 65.0

# ====================== 远程仓库直播源拉取配置 ======================
[GitHub]
# 远程GitHub/Gitee仓库的M3U/TXT直播源列表，自动拉取并合并到最终输出文件
# 每行一个链接，支持缩进多行格式
GITHUB_M3U_LINKS = 
    https://gh-proxy.com/https://raw.githubusercontent.com/develop202/migu_video/main/interface.txt
    https://gh-proxy.com/https://raw.githubusercontent.com/9527xiao9527/iptv/main/iptv.txt
    https://gh.llkk.cc/https://raw.githubusercontent.com/Kimentanm/aptv/master/m3u/iptv.m3u
    https://gh-proxy.com/https://raw.githubusercontent.com/vbskycn/iptv/master/tv/iptv4.m3u

# ====================== 抓取延迟控制配置 ======================
[Delay]
# 不同IP轮询之间的间隔时间，单位为秒，避免请求过快被网站封禁
DELAY_BETWEEN_IPS = 1.0
# 点击页面按钮后的等待加载时间，单位为秒，确保页面数据完整加载
DELAY_AFTER_CLICK = 1.0
# 单个IP最多抓取的频道数，0表示不限制
MAX_CHANNELS_PER_IP = 0
# 频道数据加载超时时间，单位为秒
DATA_LOAD_TIMEOUT = 120

# ====================== 频道数据清洗配置 ======================
[Cleaning]
# 是否启用中文频道名标准化清洗（去除乱码、无效特殊符号、冗余字符等）
ENABLE_CHINESE_CLEAN = True
# 是否启用频道去重，通过频道名+直播链接双重校验剔除重复源
ENABLE_DEDUPLICATION = True
# 是否启用频道播放页截图功能，关闭可大幅提升抓取速度
ENABLE_SCREENSHOTS = False
# 是否启用央视频道名标准化映射（统一频道命名，如把CCTV-1、CCTV1统一为标准格式）
CCTV_USE_MAPPING = True

# ====================== 网络请求基础配置 ======================
[Network]
# 直播链接无协议头时，默认补充的传输协议
DEFAULT_PROTOCOL = http://

# ====================== 测速结果缓存配置 ======================
[Cache]
# 是否启用测速结果缓存，避免重复测速，大幅提升二次运行速度
ENABLE_CACHE = True
# 缓存数据保存的文件名
CACHE_FILE = iptv_speed_cache.json
# 缓存数据的过期时间，单位为小时，过期后自动重新测速
CACHE_EXPIRE_HOURS = 48

# ====================== 播放列表更新时间配置 ======================
[UpdateTime]
# 是否把列表更新时间戳显示在播放列表的顶部
TIME_DISPLAY_AT_TOP = False
# 播放列表远程更新流地址，用于播放器端自动更新源
UPDATE_STREAM_URL = https://gitee.com/bmg369/tvtest/raw/master/cg/index.m3u8

# ====================== 页面元素自动化匹配配置 ======================
[PageElements]
# 网站搜索框/搜索功能按钮的关键词匹配，用于自动化输入关键词搜索
# 每行一个关键词，支持缩进多行
engine_search = 
    引索搜索
    引擎搜索
    关键词搜索
# 网站组播/酒店源标签页的关键词匹配，用于自动化切换对应分类
multicast_tab = 
    酒店提取
# 网站启动播放/搜索/提取按钮的关键词匹配，用于自动化触发抓取动作
start_button = 
    开始播放
    开始搜索
    开始提取
