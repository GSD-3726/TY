name: 自动更新

on:
  schedule:
    - cron: '0 */12 * * *'  # 每6小时执行一次
  workflow_dispatch:        # 允许手动触发

jobs:
  # 第一步：爬取链接并拆分为分片
  crawl-and-split:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      split_count: ${{ steps.split.outputs.split_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install playwright pytz
          python -m playwright install chromium --with-deps

      - name: 运行爬取脚本（仅爬取链接，临时禁用测速）
        run: |
          sed -i 's/ENABLE_FFMPEG_TEST = True/ENABLE_FFMPEG_TEST = False/' main.py
          python main.py
          
          python -c "
          import json
          from collections import defaultdict

          with open('raw_channels.json', 'r', encoding='utf-8') as f:
              raw_data = json.load(f)

          all_links = []
          for key, urls in raw_data.items():
              group, name = eval(key)
              for url in urls:
                  all_links.append(f'{group}|{name}|{url}')

          all_links = list(set(all_links))
          total_links = len(all_links)
          print(f'总待测速链接数：{total_links}')

          split_count = 10 if 'public' in '${{ github.repository_visibility }}' else 2
          chunk_size = (total_links + split_count - 1) // split_count

          for i in range(split_count):
              chunk = all_links[i*chunk_size : (i+1)*chunk_size]
              with open(f'links_chunk_{i}.txt', 'w', encoding='utf-8') as f:
                  f.write('\\n'.join(chunk))
              print(f'分片 {i} 生成 {len(chunk)} 条链接')

          print(f'::set-output name=split_count::{split_count}')
          "
        id: split

      - name: 上传链接分片文件
        uses: actions/upload-artifact@v4
        with:
          name: links-chunks
          path: links_chunk_*.txt

  # 第二步：矩阵并行测速
  speed-test:
    needs: crawl-and-split
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        chunk_id: ${{ fromJson('[' + join(range(0, needs.crawl-and-split.outputs.split_count), ',') + ']') }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install playwright pytz

      - name: 恢复 FFmpeg 测速缓存
        uses: actions/cache@v4
        with:
          path: iptv_speed_cache.json
          key: ${{ runner.os }}-iptv-cache-v1-${{ matrix.chunk_id }}
          restore-keys: |
            ${{ runner.os }}-iptv-cache-v1-
            ${{ runner.os }}-iptv-cache-

      - name: 下载链接分片文件
        uses: actions/download-artifact@v4
        with:
          name: links-chunks
          path: ./

      - name: 运行分片测速
        run: |
          python -c "
          import asyncio
          import json
          import time
          from collections import defaultdict
          from main import test_stream_with_ffmpeg, load_cache, save_cache

          chunk_id = ${{ matrix.chunk_id }}
          with open(f'links_chunk_{chunk_id}.txt', 'r', encoding='utf-8') as f:
              lines = [l.strip() for l in f if l.strip()]
          print(f'分片 {chunk_id} 共 {len(lines)} 条链接待测速')

          cache = load_cache()
          result_map = defaultdict(list)

          async def process_chunk():
              sem = asyncio.Semaphore(3)
              tasks = []

              async def test_single_url(group, name, url):
                  async with sem:
                      if url in cache and cache[url].get('ok'):
                          result_map[(group, name)].append(url)
                          return
                      res = await test_stream_with_ffmpeg(url)
                      if res['ok']:
                          result_map[(group, name)].append(url)
                          cache[url] = {
                              'ok': res['ok'], 'fps': res['fps'],
                              'frames': res.get('frames', 0),
                              'width': res.get('width', 0),
                              'height': res.get('height', 0),
                              'timestamp': time.time()
                          }

              for line in lines:
                  group, name, url = line.split('|', 2)
                  tasks.append(test_single_url(group, name, url))
              await asyncio.gather(*tasks)

          asyncio.run(process_chunk())

          with open(f'result_chunk_{chunk_id}.json', 'w', encoding='utf-8') as f:
              json.dump(dict(result_map), f, ensure_ascii=False)
          save_cache(cache)
          print(f'分片 {chunk_id} 测速完成，有效链接 {sum(len(v) for v in result_map.values())} 条')
          "

      - name: 上传分片结果和缓存
        uses: actions/upload-artifact@v4
        with:
          name: result-chunk-${{ matrix.chunk_id }}
          path: |
            result_chunk_${{ matrix.chunk_id }}.json
            iptv_speed_cache.json

  # 第三步：合并结果并提交到仓库
  merge-and-push:
    needs: speed-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytz

      - name: 下载所有分片结果和缓存
        uses: actions/download-artifact@v4
        with:
          pattern: result-chunk-*
          merge-multiple: true

      - name: 合并结果并生成最终文件
        run: |
          python -c "
          import json
          from collections import defaultdict
          from main import export_results_with_timestamp

          final_map = defaultdict(list)
          split_count = ${{ needs.crawl-and-split.outputs.split_count }}
          for i in range(split_count):
              try:
                  with open(f'result_chunk_{i}.json', 'r', encoding='utf-8') as f:
                      chunk_data = json.load(f)
                  for key, urls in chunk_data.items():
                      group, name = eval(key)
                      final_map[(group, name)].extend(urls)
              except FileNotFoundError:
                  print(f'分片 {i} 结果文件不存在，跳过')
                  continue

          for key in final_map:
              final_map[key] = list(dict.fromkeys(final_map[key]))[:10]

          export_results_with_timestamp(final_map)
          print(f'合并完成！最终有效链接 {sum(len(v) for v in final_map.values())} 条')
          "

      - name: List generated files
        run: |
          echo "生成的文件:"
          ls -la *.m3u *.txt *.json 2>/dev/null || echo "未找到生成的文件"
          echo "缓存文件:"
          ls -la iptv_speed_cache.json 2>/dev/null || echo "未找到缓存文件"

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add iptv_channels.m3u iptv_channels.txt iptv_speed_cache.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "没有更新的内容，跳过提交"
            exit 0
          fi
          
          git commit -m "📺 Auto update $(date +'%Y-%m-%d %H:%M')"
          git push
