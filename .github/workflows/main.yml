name: 自动更新

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时执行一次
  workflow_dispatch:        # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ==========================================
      # 【优化 1/4】恢复 FFmpeg 测速缓存
      # 修正 Key 逻辑，确保缓存能被复用
      # ==========================================
      - name: 恢复 FFmpeg 测速缓存
        id: cache-iptv
        uses: actions/cache@v4
        with:
          path: iptv_speed_cache.json  # 对应你 Python 代码里 CACHE_FILE 的文件名
          key: ${{ runner.os }}-iptv-cache  # 固定 Key 前缀，确保能复用
          restore-keys: |
            ${{ runner.os }}-iptv-cache-

      - name: Install dependencies
        run: |
          sudo apt update
          # 【优化 2/4】安装 FFmpeg (必须)
          sudo apt install -y ffmpeg
          # 【优化 3/4】安装 Python 依赖（补充 requests，移除不必要的 aiohttp）
          pip install requests playwright
          python -m playwright install chromium --with-deps

      - name: Run IPTV update
        run: python main.py
        continue-on-error: true  # 即使脚本报错（如网站挂了），也继续执行后面的步骤

      - name: List generated files
        run: ls -la *.m3u *.txt *.json 2>/dev/null || echo "未找到生成的文件"

      # ==========================================
      # 【优化 4/4】提交并推送结果
      # ==========================================
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加所有可能的输出文件 (m3u, txt, 以及缓存json)
          git add *.m3u *.txt iptv_speed_cache.json 2>/dev/null || true
          
          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "没有更新的内容，跳过提交"
            exit 0
          fi
          
          git commit -m "📺 Auto update $(date +'%Y-%m-%d %H:%M')"
          git push
