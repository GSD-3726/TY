name: 自动更新

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时执行一次
  workflow_dispatch:        # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 恢复 FFmpeg 测速缓存
      - name: 恢复 FFmpeg 测速缓存
        uses: actions/cache@v4
        with:
          path: iptv_speed_cache.json
          key: ${{ runner.os }}-iptv-cache-v1
          restore-keys: |
            ${{ runner.os }}-iptv-cache-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install playwright pytz
          python -m playwright install chromium --with-deps

      - name: Run IPTV update
        run: python main.py

      - name: List generated files
        run: |
          echo "生成的文件:"
          ls -la *.m3u *.txt *.json 2>/dev/null || echo "未找到生成的文件"
          echo "缓存文件:"
          ls -la iptv_speed_cache.json 2>/dev/null || echo "未找到缓存文件"

      # 提交并推送结果
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加所有可能的输出文件
          git add iptv_channels.m3u iptv_channels.txt iptv_speed_cache.json 2>/dev/null || true
          
          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "没有更新的内容，跳过提交"
            exit 0
          fi
          
          git commit -m "📺 Auto update $(date +'%Y-%m-%d %H:%M')"
          git push
